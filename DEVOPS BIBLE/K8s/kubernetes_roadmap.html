<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Zero to Hero Roadmap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0e14; --bg2: #111720; --bg3: #1a2333; --surface: #1e2d42;
    --border: #2a3f5f; --border2: #3a5278;
    --text: #e2eaf4; --muted: #7a96b8;
    --accent: #326CE5; --accent2: #00D4FF;
    --green: #2dce89; --amber: #ffa530; --red: #f55b5b; --purple: #a78bfa;
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .hero { border-bottom: 1px solid var(--border); padding: 44px 40px 36px; position: relative; overflow: hidden; }
  .hero::before { content:''; position:absolute; top:-120px; left:50%; transform:translateX(-50%); width:700px; height:400px; background:radial-gradient(ellipse,rgba(50,108,229,0.16) 0%,transparent 70%); pointer-events:none; }
  .hero-inner { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  .k8s-logo { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
  .wheel { width:48px; height:48px; border:2.5px solid var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; animation:spin 18s linear infinite; flex-shrink:0; }
  .wheel-hub { width:10px; height:10px; background:var(--accent); border-radius:50%; }
  .wheel::before,.wheel::after { content:''; position:absolute; width:2px; height:100%; background:var(--accent); border-radius:1px; }
  .wheel::after { transform:rotate(60deg); }
  .wheel-spoke { position:absolute; width:2px; height:100%; background:var(--accent); border-radius:1px; transform:rotate(120deg); }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hero-title { font-size:36px; font-weight:800; letter-spacing:-1px; line-height:1.1; }
  .hero-title span { color:var(--accent); }
  .hero-sub { color:var(--muted); font-size:14px; margin-top:8px; }
  .hero-stats { display:flex; gap:20px; margin-top:24px; flex-wrap:wrap; }
  .stat { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px 18px; }
  .stat-num { font-size:20px; font-weight:700; color:var(--accent2); }
  .stat-label { font-size:11px; color:var(--muted); margin-top:2px; }

  .progress-bar-wrap { max-width:900px; margin:0 auto; padding:22px 40px 0; }
  .progress-label { font-size:12px; color:var(--muted); margin-bottom:8px; display:flex; justify-content:space-between; }
  .progress-track { height:6px; background:var(--bg3); border-radius:3px; display:flex; gap:2px; }
  .progress-seg { height:100%; border-radius:3px; flex:1; opacity:0.25; transition:opacity 0.3s; }
  .progress-seg.done { opacity:1; }

  .main { max-width:900px; margin:0 auto; padding:28px 40px 64px; }

  .phase { border:1px solid var(--border); border-radius:16px; background:var(--bg2); margin-bottom:18px; overflow:hidden; transition:border-color 0.2s; }
  .phase:hover { border-color:var(--border2); }
  .phase.open { border-color:var(--border2); }
  .phase-header { display:flex; align-items:center; gap:14px; padding:18px 22px; cursor:pointer; user-select:none; }
  .phase-num { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; }
  .phase-meta { flex:1; }
  .phase-title { font-size:16px; font-weight:700; }
  .phase-tagline { font-size:12px; color:var(--muted); margin-top:2px; }
  .phase-badges { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
  .badge { font-size:10px; font-weight:600; padding:3px 9px; border-radius:20px; background:var(--bg3); border:1px solid var(--border); color:var(--muted); white-space:nowrap; }
  .badge.time { color:var(--amber); border-color:rgba(255,165,48,0.3); background:rgba(255,165,48,0.08); }
  .badge.level { color:var(--green); border-color:rgba(45,206,137,0.3); background:rgba(45,206,137,0.08); }
  .chevron { width:18px; height:18px; border-right:2px solid var(--muted); border-bottom:2px solid var(--muted); transform:rotate(45deg); transition:transform 0.25s; flex-shrink:0; margin-top:-3px; }
  .phase.open .chevron { transform:rotate(225deg); margin-top:3px; }
  .phase-body { display:none; padding:0 22px 22px; }
  .phase.open .phase-body { display:block; }
  .section-label { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin:18px 0 10px; }

  /* TOPICS */
  .topics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(195px,1fr)); gap:8px; }

  .topic { background:var(--bg3); border:1px solid var(--border); border-radius:10px; cursor:pointer; transition:border-color 0.2s, background 0.2s; overflow:hidden; }
  .topic:hover { border-color:var(--border2); background:var(--surface); }
  .topic.done { border-color:rgba(45,206,137,0.35); background:rgba(45,206,137,0.04); }
  .topic.expanded { border-color:var(--border2); background:var(--surface); grid-column: 1 / -1; }
  .topic.done.expanded { border-color:rgba(45,206,137,0.5); }

  .topic-header { display:flex; align-items:flex-start; gap:10px; padding:11px 13px; }
  .topic-check { width:17px; height:17px; border-radius:5px; border:1.5px solid var(--border2); flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:2px; transition: background 0.2s, border-color 0.2s; }
  .topic.done .topic-check { background:var(--green); border-color:var(--green); }
  .topic.done .topic-check::after { content:''; width:4px; height:8px; border-right:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(45deg) translate(-1px,-1px); display:block; }
  .topic-title-wrap { flex:1; min-width:0; }
  .topic-text { font-size:12px; font-weight:700; line-height:1.4; }
  .topic-sub { font-size:11px; color:var(--muted); margin-top:2px; font-weight:400; }
  .topic-arrow { font-size:10px; color:var(--muted); flex-shrink:0; margin-top:3px; transition:transform 0.2s; line-height:1; }
  .topic.expanded .topic-arrow { transform:rotate(180deg); }

  /* EXPANDED BODY */
  .topic-body { display:none; padding:0 14px 14px 14px; border-top:1px solid var(--border); }
  .topic.expanded .topic-body { display:block; }

  .topic-inner { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px; }
  @media(max-width:600px){ .topic-inner { grid-template-columns:1fr; } }

  .topic-col {}
  .topic-section-title { font-size:10px; font-weight:700; letter-spacing:1.2px; color:var(--muted); text-transform:uppercase; margin-bottom:7px; }
  .topic-desc { font-size:12px; color:var(--muted); line-height:1.7; }

  .concept-pills { display:flex; flex-wrap:wrap; gap:5px; }
  .pill { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--bg); border:1px solid var(--border); color:var(--muted); font-family:var(--mono); line-height:1.4; }

  .cmd-list { display:flex; flex-direction:column; gap:4px; }
  .cmd { font-family:var(--mono); font-size:11px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:5px 10px; color:var(--accent2); white-space:pre-wrap; word-break:break-all; line-height:1.5; }

  .tip-box { background:rgba(50,108,229,0.08); border:1px solid rgba(50,108,229,0.22); border-radius:7px; padding:9px 12px; margin-top:12px; font-size:12px; color:var(--muted); line-height:1.6; }
  .tip-box b { color:var(--accent2); font-weight:600; }

  .topic-actions { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .mark-done-btn { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; padding:5px 13px; border-radius:20px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; font-family:'Syne',sans-serif; }
  .mark-done-btn:hover { border-color:var(--green); color:var(--green); }
  .topic.done .mark-done-btn { border-color:var(--green); color:var(--green); background:rgba(45,206,137,0.08); }

  .projects { display:flex; flex-direction:column; gap:8px; }
  .project-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
  .project-top { display:flex; align-items:center; gap:9px; margin-bottom:5px; }
  .project-icon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .project-name { font-size:13px; font-weight:700; }
  .project-desc { font-size:12px; color:var(--muted); line-height:1.5; }

  .resources { display:flex; flex-wrap:wrap; gap:7px; }
  .resource { font-size:11px; padding:4px 11px; border-radius:20px; border:1px solid var(--border); background:var(--bg3); color:var(--muted); display:flex; align-items:center; gap:5px; }
  .resource-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

  .connector { width:2px; height:14px; background:var(--border); margin:0 auto -2px; border-radius:1px; }

  .footer-note { text-align:center; color:var(--muted); font-size:13px; margin-top:36px; padding-top:28px; border-top:1px solid var(--border); line-height:1.6; }
  .footer-note strong { color:var(--text); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="k8s-logo">
      <div class="wheel"><div class="wheel-hub"></div><div class="wheel-spoke"></div></div>
      <span style="font-size:12px;color:var(--muted);font-family:var(--mono)">kubernetes / zero → hero</span>
    </div>
    <h1 class="hero-title">Your K8s <span>Learning Journey</span></h1>
    <p class="hero-sub">Click any topic block to expand — see what to learn, key concepts, commands &amp; study tips</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">6</div><div class="stat-label">Phases</div></div>
      <div class="stat"><div class="stat-num" id="total-topics">0</div><div class="stat-label">Topics</div></div>
      <div class="stat"><div class="stat-num" id="done-count">0</div><div class="stat-label">Completed</div></div>
      <div class="stat"><div class="stat-num">5–7 mo</div><div class="stat-label">Timeline</div></div>
    </div>
  </div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-label"><span>Overall progress</span><span id="pct-label">0%</span></div>
  <div class="progress-track" id="progress-track"></div>
</div>

<div class="main" id="roadmap"></div>

<script>
const phases = [
  {
    color:'#326CE5', num:'01',
    title:'Foundations — Linux, Containers & Networking',
    tagline:'Master the building blocks before touching K8s',
    time:'3–4 weeks', level:'Beginner',
    topics:[
      { name:'Linux CLI basics', sub:'Files, processes, permissions',
        desc:'Everything in Kubernetes runs on Linux. Be comfortable navigating the filesystem, managing processes, reading logs, and setting file permissions before you touch a cluster.',
        concepts:['ls / cd / cp / mv / rm','chmod / chown','ps aux / kill / top','grep / awk / sed / tail','systemctl start/stop','ssh & scp basics'],
        cmds:['ls -la /etc/kubernetes','tail -f /var/log/syslog','ps aux | grep kubelet','chmod 600 ~/.kube/config','ssh user@node -i key.pem'],
        tip:'Practice on killercoda.com free Linux playgrounds — real terminal, no install needed.' },
      { name:'bash scripting', sub:'Variables, loops, conditionals',
        desc:'Bash scripts are everywhere in DevOps — health-check loops, deployment helpers, CI steps. Even basic scripting makes you dramatically more productive.',
        concepts:['Variables & exports','if/else conditionals','for & while loops','Functions','$? exit codes','Here-docs & piping'],
        cmds:['#!/bin/bash','if [ $? -eq 0 ]; then echo ok; fi','for pod in $(kubectl get pods -o name); do echo $pod; done','chmod +x script.sh && ./script.sh'],
        tip:'Write a script that watches kubectl get pods and alerts when any pod is in CrashLoopBackOff. Real practice, real skill.' },
      { name:'Networking essentials', sub:'TCP/IP, DNS, ports, subnets',
        desc:'K8s networking builds on fundamentals. Understand IPs, ports, DNS resolution, and routing before Service types make sense.',
        concepts:['IP addressing & CIDR','TCP 3-way handshake','DNS resolution chain','NAT & routing','Ports & sockets','iptables basics'],
        cmds:['curl -v https://example.com','nslookup kubernetes.default.svc.cluster.local','netstat -tulpn','traceroute 8.8.8.8','ping -c 4 google.com'],
        tip:'Use tcpdump inside a pod to see actual traffic — watching packets is the fastest way to understand networking.' },
      { name:'Docker fundamentals', sub:'Images, containers, volumes',
        desc:'Kubernetes orchestrates containers. Understand what a container IS — how it isolates processes, how images are layered, how volumes persist data — before K8s makes sense.',
        concepts:['Image vs container difference','Layers & union filesystem','docker run flags (-d, -p, -v)','Port mapping','Volume mounts','Container lifecycle states'],
        cmds:['docker run -d -p 8080:80 nginx','docker exec -it <id> bash','docker logs -f <id>','docker inspect <id>','docker stop <id> && docker rm <id>'],
        tip:'Break things deliberately: run a container, kill it, see data is gone. Add a volume and repeat. This is how volumes click.' },
      { name:'Dockerfile authoring', sub:'Multi-stage builds, best practices',
        desc:'Every app you deploy to K8s starts as a Dockerfile. Writing lean, secure, reproducible images is a core skill — a bloated image slows pulls and increases attack surface.',
        concepts:['FROM / RUN / COPY / CMD / EXPOSE','Layer caching order matters','Multi-stage builds','.dockerignore file','Non-root USER instruction','ARG vs ENV'],
        cmds:['docker build -t myapp:v1 .','docker image ls','docker history myapp:v1','docker build --no-cache -t myapp:v2 .'],
        tip:'Compare image sizes: a naive Node.js image vs a multi-stage build. The difference is often 900 MB → 80 MB. Eye-opening.' },
      { name:'docker-compose', sub:'Multi-container local apps',
        desc:'Before Helm charts, docker-compose teaches you to declare multi-service apps in YAML — the same mental model K8s uses, just simpler.',
        concepts:['services / networks / volumes blocks','depends_on ordering','env_file loading','-d detach flag','Named vs anonymous volumes','Build vs pull image'],
        cmds:['docker-compose up -d','docker-compose logs -f app','docker-compose down -v','docker-compose ps','docker-compose exec app bash'],
        tip:'Build a compose file: app + postgres + redis. This exact 3-service pattern becomes a Helm chart in Phase 4.' },
      { name:'Container registries', sub:'Docker Hub, ECR, push/pull',
        desc:'K8s pulls images from registries. Know how to tag, push, and authenticate — especially for private ECR registries on AWS EKS.',
        concepts:['docker tag convention','docker push / pull','imagePullSecrets in K8s','ECR login command','OCI image spec','Image digest vs mutable tag'],
        cmds:['docker tag myapp:v1 myuser/myapp:v1','docker push myuser/myapp:v1','aws ecr get-login-password | docker login --username AWS --password-stdin <ecr-url>','docker pull myuser/myapp@sha256:<digest>'],
        tip:'Always use image digests (sha256:...) in production, not floating tags like :latest — tags can be overwritten silently without warning.' },
      { name:'YAML syntax', sub:'Anchors, maps, sequences',
        desc:'Every K8s manifest is YAML. Getting comfortable with indentation, anchors, and multi-line strings saves hours of debugging mysterious parse errors.',
        concepts:['Scalars / maps / sequences','Indentation: spaces not tabs','Anchors & aliases (& and *)','Multi-line: | (literal) and > (folded)','Null / boolean gotchas','JSON is valid YAML'],
        cmds:['python3 -c "import yaml,sys; yaml.safe_load(sys.stdin)" < manifest.yaml','kubectl apply --dry-run=client -f manifest.yaml','yamllint manifest.yaml'],
        tip:'Install the VS Code YAML extension with K8s schema validation. It underlines mistakes before kubectl ever sees the file.' },
    ],
    projects:[
      { icon:'🐳', name:'Containerise a Node.js app', desc:'Write a Dockerfile, push to Docker Hub, run with docker-compose alongside a Postgres DB.' },
      { icon:'🌐', name:'Networking lab', desc:'Two containers communicate across a custom network; inspect traffic with tcpdump and curl.' },
    ],
    resources:['Docker official docs','Linux Journey (linuxjourney.com)','TechWorld Nana Docker course','NetworkChuck YouTube'],
  },
  {
    color:'#00b4d8', num:'02',
    title:'Kubernetes Core Concepts',
    tagline:'Learn the K8s API and what every object does',
    time:'4–5 weeks', level:'Beginner–Intermediate',
    topics:[
      { name:'K8s architecture', sub:'Control plane, worker nodes, etcd',
        desc:'Understand WHAT Kubernetes is before writing manifests: a distributed system with a control plane making decisions and worker nodes running workloads.',
        concepts:['kube-apiserver (gateway)','etcd (source of truth)','kube-scheduler (placement)','controller-manager (reconcile loops)','kubelet (node agent)','kube-proxy (networking)'],
        cmds:['kubectl cluster-info','kubectl get nodes -o wide','kubectl get componentstatuses','kubectl describe node <name>','kubectl get pods -n kube-system'],
        tip:'Draw the architecture from memory once. Knowing where each component runs tells you WHERE to look when something breaks.' },
      { name:'Pods', sub:'Lifecycle, multi-container patterns',
        desc:'The Pod is the smallest deployable unit — one or more containers sharing network and storage. Almost everything else in K8s manages Pods.',
        concepts:['Single vs multi-container pods','Sidecar pattern','Init containers','Pod phases: Pending/Running/Succeeded/Failed','restartPolicy: Always/OnFailure/Never','Pod IP lifetime'],
        cmds:['kubectl run nginx --image=nginx --restart=Never','kubectl exec -it <pod> -- bash','kubectl logs <pod> -c <container>','kubectl describe pod <pod>','kubectl get pod <n> -o yaml'],
        tip:'Run kubectl get pod <name> -o yaml and read every field. This teaches you 80% of the K8s object model in one exercise.' },
      { name:'ReplicaSets & Deployments', sub:'Rolling updates, rollbacks',
        desc:'Deployments manage ReplicaSets which manage Pods. They ensure desired replicas run and handle rolling updates without downtime.',
        concepts:['ReplicaSet desired/current/ready','RollingUpdate strategy','maxSurge & maxUnavailable','Revision history limit','Pausing a rollout','kubectl rollout commands'],
        cmds:['kubectl create deploy nginx --image=nginx:1.25 --replicas=3','kubectl set image deploy/nginx nginx=nginx:1.26','kubectl rollout status deploy/nginx','kubectl rollout history deploy/nginx','kubectl rollout undo deploy/nginx'],
        tip:'Deploy a bad image tag on purpose, watch pods fail, then kubectl rollout undo. This muscle memory saves you in production incidents.' },
      { name:'Services', sub:'ClusterIP, NodePort, LoadBalancer',
        desc:'Services give Pods a stable DNS name and IP. Without Services, your app cannot be reliably reached — Pod IPs change every restart.',
        concepts:['ClusterIP — internal only','NodePort — exposed on every node','LoadBalancer — cloud LB provisioned','Service selector matching labels','Endpoints object','DNS: <svc>.<ns>.svc.cluster.local'],
        cmds:['kubectl expose deploy/nginx --port=80 --type=ClusterIP','kubectl get svc','kubectl get endpoints nginx','kubectl port-forward svc/nginx 8080:80'],
        tip:'When a Service shows no endpoints (kubectl get endpoints returns none), 99% of the time the label selector does not match Pod labels. Check both.' },
      { name:'ConfigMaps & Secrets', sub:'Environment config, base64',
        desc:'Never hardcode config in images. ConfigMaps hold non-sensitive config; Secrets hold credentials. Both can be mounted as env vars or files.',
        concepts:['kubectl create configmap','kubectl create secret generic','envFrom vs single env','Volume mount as files','Immutable ConfigMaps','base64 is encoding, not encryption'],
        cmds:['kubectl create configmap app-config --from-literal=DB_HOST=postgres','kubectl create secret generic db-creds --from-literal=password=s3cr3t','kubectl get secret db-creds -o jsonpath=\'{.data.password}\' | base64 -d'],
        tip:'Secrets are only base64 encoded by default — NOT encrypted at rest. In production use Sealed Secrets or External Secrets Operator.' },
      { name:'Namespaces', sub:'Resource isolation per team',
        desc:'Namespaces let multiple teams or environments share a cluster without stepping on each other — each gets its own RBAC and quota.',
        concepts:['Default namespaces (default, kube-system, kube-public)','ResourceQuota per namespace','LimitRange defaults','Cross-namespace DNS format','kubens switching tool','Context + namespace pairing'],
        cmds:['kubectl create namespace staging','kubectl get all -n kube-system','kubectl config set-context --current --namespace=staging','kubens staging  # install kubens from krew'],
        tip:'Install kubectx and kubens immediately — switching contexts and namespaces without them wastes 5 minutes per day of frustration.' },
      { name:'kubectl', sub:'get, describe, logs, exec, apply',
        desc:'kubectl is your primary interface to every cluster. Becoming fast with it is the single highest-ROI skill in all of Kubernetes.',
        concepts:['apply (declarative) vs create (imperative)','--dry-run=client -o yaml pattern','Output: -o wide / json / jsonpath','watch: kubectl get pods -w','Field selectors','Sorting with --sort-by'],
        cmds:['kubectl apply -f .','kubectl get pods -A -o wide','kubectl describe pod <name>','kubectl delete pod <name> --force','kubectl diff -f manifest.yaml'],
        tip:'Master --dry-run=client -o yaml. In the CKA exam you generate YAML skeletons with it then edit — saves 80% of typing time.' },
      { name:'Labels & Selectors', sub:'Targeting resources precisely',
        desc:'Labels are key=value tags on any object. Selectors use them to target groups. Services find Pods via labels — a selector mismatch means zero traffic delivered.',
        concepts:['Label key/value format rules','Equality-based: env=prod','Set-based: env in (prod,staging)','Annotations vs labels distinction','kubectl label add/remove','Service selector pitfalls'],
        cmds:['kubectl label pod nginx env=prod','kubectl get pods -l env=prod','kubectl get pods -l \'env in (prod,staging)\'','kubectl annotate pod nginx note="checked"'],
        tip:'When traffic does not reach a pod, first check: kubectl get endpoints <service-name>. If empty, the label selector does not match.' },
      { name:'Probes', sub:'Liveness, readiness, startup',
        desc:'Probes tell K8s whether your container is alive and ready to serve traffic. Wrong probe config causes needless restarts or sends traffic to unready pods.',
        concepts:['livenessProbe — restart if fails','readinessProbe — remove from Service if fails','startupProbe — allow slow start','HTTP / TCP / exec probe types','initialDelaySeconds','failureThreshold & periodSeconds'],
        cmds:['kubectl describe pod <n> | grep -A 10 Liveness','kubectl get events --sort-by=.metadata.creationTimestamp','kubectl get pod <n> -o json | jq .status.containerStatuses'],
        tip:'CrashLoopBackOff with short intervals = liveness probe fires before app is ready. Always add startupProbe for slow-starting apps.' },
      { name:'Resource limits', sub:'requests, limits, QoS classes',
        desc:'Without resource requests/limits, one noisy pod can starve the whole node. Requests are used for scheduling; limits enforce caps at runtime.',
        concepts:['requests — scheduler guarantee','limits — runtime cap','CPU in millicores (500m = 0.5 CPU)','Memory in Mi/Gi','QoS: Guaranteed / Burstable / BestEffort','OOMKilled exit code 137'],
        cmds:['kubectl describe node <n> | grep -A 10 "Allocated resources"','kubectl top pods --sort-by=memory','kubectl top nodes'],
        tip:'Always set requests. Without them the scheduler places pods randomly and nodes get OOM-killed under production load on a random Friday night.' },
    ],
    projects:[
      { icon:'🚀', name:'Deploy app to minikube', desc:'Deployment + Service YAML, NodePort expose, roll out new image, rollback.' },
      { icon:'🔐', name:'Secrets & config lab', desc:'ConfigMap as volume mount, Secret as env var, verify values inside the running pod.' },
    ],
    resources:['Kubernetes.io official docs','KodeKloud K8s for Beginners','TechWorld Nana K8s full course','killercoda.com interactive labs'],
  },
  {
    color:'#2dce89', num:'03',
    title:'Intermediate K8s — Storage, Networking & RBAC',

      { name:'RBAC', sub:'Roles, ClusterRoles, Bindings',

const container = document.getElementById('roadmap');
let allTopics = [];

phases.forEach((phase, pi) => {
  if (pi > 0) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    container.appendChild(conn);
  }

  const el = document.createElement('div');
  el.className = 'phase';
  el.innerHTML = `
    <div class="phase-header" onclick="togglePhase(this.parentElement)">
      <div class="phase-num" style="background:${phase.color}22;color:${phase.color};border:1px solid ${phase.color}44">${phase.num}</div>
      <div class="phase-meta">
        <div class="phase-title" style="color:${phase.color}">${phase.title}</div>
        <div class="phase-tagline">${phase.tagline}</div>
      </div>
      <div class="phase-badges">
        <span class="badge time">&#9200; ${phase.time}</span>
        <span class="badge level">${phase.level}</span>
      </div>
      <div class="chevron"></div>
    </div>
    <div class="phase-body">
      <div class="section-label">Topics &mdash; click any block to expand details</div>
      <div class="topics-grid" id="topics-${pi}"></div>
      <div class="section-label">Hands-on Projects</div>
      <div class="projects" id="projects-${pi}"></div>
      <div class="section-label">Resources</div>
      <div class="resources" id="resources-${pi}"></div>
    </div>
  `;
  container.appendChild(el);

  const topicGrid = el.querySelector(`#topics-${pi}`);

  phase.topics.forEach((t, ti) => {
    const id = `t-${pi}-${ti}`;
    allTopics.push(id);

    const pillsHTML = (t.concepts||[]).map(c=>`<span class="pill">${c}</span>`).join('');
    const cmdsHTML = (t.cmds||[]).map(c=>`<div class="cmd">${c}</div>`).join('');

    const div = document.createElement('div');
    div.className = 'topic';
    div.id = id;
    div.innerHTML = `
      <div class="topic-header">
        <div class="topic-check"></div>
        <div class="topic-title-wrap">
          <div class="topic-text">${t.name}</div>
          <div class="topic-sub">${t.sub}</div>
        </div>
        <div class="topic-arrow">&#9660;</div>
      </div>
      <div class="topic-body">
        <div class="topic-inner">
          <div class="topic-col">
            <div class="topic-section-title">What to learn</div>
            <div class="topic-desc">${t.desc}</div>
            ${pillsHTML ? `<div style="margin-top:12px"><div class="topic-section-title">Key concepts</div><div class="concept-pills">${pillsHTML}</div></div>` : ''}
          </div>
          <div class="topic-col">
            ${cmdsHTML ? `<div class="topic-section-title">Key commands</div><div class="cmd-list">${cmdsHTML}</div>` : ''}
          </div>
        </div>
        ${t.tip ? `<div class="tip-box"><b>&#128161; Study tip:</b> ${t.tip}</div>` : ''}
        <div class="topic-actions">
          <button class="mark-done-btn" id="btn-${id}" onclick="event.stopPropagation(); toggleDone('${id}', '${phase.color}')">Mark as done</button>
        </div>
      </div>
    `;

    div.querySelector('.topic-header').addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = div.classList.contains('expanded');
      // Close others in same grid
      topicGrid.querySelectorAll('.topic.expanded').forEach(other => {
        if (other !== div) other.classList.remove('expanded');
      });
      div.classList.toggle('expanded', !isOpen);
    });

    topicGrid.appendChild(div);
  });

  const projGrid = el.querySelector(`#projects-${pi}`);
  phase.projects.forEach(p => {
    const div = document.createElement('div');
    div.className = 'project-card';
    div.innerHTML = `
      <div class="project-top">
        <div class="project-icon" style="background:${phase.color}22;">${p.icon}</div>
        <div class="project-name">${p.name}</div>
      </div>
      <div class="project-desc">${p.desc}</div>
    `;
    projGrid.appendChild(div);
  });

  const resWrap = el.querySelector(`#resources-${pi}`);
  phase.resources.forEach(r => {
    const span = document.createElement('span');
    span.className = 'resource';
    span.innerHTML = `<span class="resource-dot" style="background:${phase.color}"></span>${r}`;
    resWrap.appendChild(span);
  });
});

document.getElementById('total-topics').textContent = allTopics.length;

const track = document.getElementById('progress-track');
allTopics.forEach((_, i) => {
  const seg = document.createElement('div');
  seg.className = 'progress-seg';
  seg.id = `seg-${i}`;
  const phaseIdx = Math.min(Math.floor(i / 10), phases.length - 1);
  seg.style.background = phases[phaseIdx].color;
  track.appendChild(seg);
});

function toggleDone(id, color) {
  const el = document.getElementById(id);
  el.classList.toggle('done');
  const btn = document.getElementById(`btn-${id}`);
  btn.textContent = el.classList.contains('done') ? '&#10003; Completed' : 'Mark as done';
  updateProgress();
}

function updateProgress() {
  const done = document.querySelectorAll('.topic.done').length;
  const total = allTopics.length;
  document.getElementById('done-count').textContent = done;
  const pct = Math.round((done / total) * 100);
  document.getElementById('pct-label').textContent = pct + '%';
  document.querySelectorAll('.progress-seg').forEach((seg, i) => {
    seg.classList.toggle('done', i < done);
  });
}

function togglePhase(el) { el.classList.toggle('open'); }

document.querySelector('.phase').classList.add('open');

const footer = document.createElement('div');
footer.className = 'footer-note';
footer.innerHTML = `<strong>Pro tip:</strong> Don't rush phases. Master one concept before moving to the next.<br>Build real projects at every stage — theory without practice fades fast.<br>Target <strong>CKA certification</strong> after Phase 5. It validates everything you have learned.`;
document.querySelector('.main').appendChild(footer);

updateProgress();
</script>
</body>
</html>
